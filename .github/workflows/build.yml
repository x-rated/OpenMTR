name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.1'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        run: msbuild OpenMTR2.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Collect Qt runtime DLLs
        shell: pwsh
        run: |
          $out = "dist"
          New-Item -ItemType Directory -Force $out | Out-Null
          Copy-Item "bin\x64\Release\OpenMTR2.exe" $out
          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" --no-translations --no-opengl-sw --no-system-d3d-compiler "$out\OpenMTR2.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenMTR2-x64
          path: dist/

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.1'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        run: msbuild OpenMTR2.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Package
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}"
          $out = "OpenMTR2-$ver-x64"
          New-Item -ItemType Directory -Force $out | Out-Null
          Copy-Item "bin\x64\Release\OpenMTR2.exe" $out
          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" --no-translations --no-opengl-sw --no-system-d3d-compiler "$out\OpenMTR2.exe"
          Compress-Archive -Path $out -DestinationPath "$out.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: OpenMTR2-*.zip
          generate_release_notes: true
